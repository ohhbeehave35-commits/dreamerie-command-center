<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat with The Dreamerie</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #2a2130; }

  /* Collapsed bubble (bottom-right of the embed) */
  #bubble { position: fixed; right: 14px; bottom: 14px; width: 62px; height: 62px; border-radius: 50%;
            background: linear-gradient(135deg, #e0b8f0, #b87ad9); color: #2a1530; border: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.28); cursor: pointer; font-size: 26px; display: flex;
            align-items: center; justify-content: center; z-index: 5; }
  #bubble:hover { transform: scale(1.05); }
  #bubble .badge { position: absolute; top: -4px; right: -4px; background: #9b4fc9; color: #fff;
                   font-size: 11px; font-weight: 700; border-radius: 10px; padding: 1px 6px; }

  /* Open chat panel (fills the embed) */
  #panel { position: fixed; inset: 0; display: flex; flex-direction: column; background: #fdf9ff;
           border-radius: 14px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
  header { background: linear-gradient(135deg, #e0b8f0, #b87ad9); color: #2a1530; padding: 12px 14px;
           display: flex; align-items: center; gap: 9px; flex: none; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #6d3f8f; box-shadow: 0 0 0 3px rgba(109,63,143,0.25); }
  header .t { font-weight: 800; font-size: 15px; }
  header .x { margin-left: auto; background: rgba(0,0,0,0.12); border: none; color: #2a1530; width: 26px;
              height: 26px; border-radius: 50%; font-size: 17px; cursor: pointer; line-height: 1; }
  header .x:hover { background: rgba(0,0,0,0.22); }
  #log { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 9px 13px; border-radius: 15px; font-size: 14.5px; line-height: 1.45; white-space: pre-wrap; }
  .bot { align-self: flex-start; background: #f3e3fa; border: 1px solid #e3c6f0; border-bottom-left-radius: 4px; }
  .me  { align-self: flex-end; background: #2a1530; color: #fff; border-bottom-right-radius: 4px; }
  .typing { align-self: flex-start; color: #9a86a8; font-size: 13px; font-style: italic; }
  form { display: flex; gap: 7px; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #eee0f5; background: #fdf9ff; flex: none; }
  input { flex: 1; font-size: 15px; padding: 11px 13px; border: 1px solid #e3c6f0; border-radius: 20px; outline: none; }
  input:focus { border-color: #b87ad9; }
  form button { border: none; background: #b87ad9; color: #fff; font-weight: 700; font-size: 14px;
                padding: 0 17px; border-radius: 20px; cursor: pointer; }
  form button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <!-- Collapsed state -->
  <button id="bubble" title="Chat with us" style="display:none">👑<span class="badge">Chat</span></button>

  <!-- Open state -->
  <div id="panel">
    <header>
      <span class="dot"></span>
      <span class="t" id="headerName">The Dreamerie</span>
      <button class="x" id="closeBtn" title="Minimize">–</button>
    </header>
    <div id="log">
      <div class="msg bot" id="greeting">Hi there! ✨ Ask me about our candles, decor, or gifts — or tell me what you need and I'll take care of you.</div>
    </div>
    <form id="f">
      <input id="i" placeholder="Type your message…" autocomplete="off">
      <button id="b" type="submit">Send</button>
    </form>
    <div style="text-align:center;padding:4px 0 8px;flex:none;">
      <a href="/privacy" target="_blank" rel="noopener" style="font-size:10.5px;color:#b6a3c9;text-decoration:none;">Privacy</a>
    </div>
  </div>
<script>
  const panel = document.getElementById('panel'), bubble = document.getElementById('bubble');
  const log = document.getElementById('log'), input = document.getElementById('i'),
        btn = document.getElementById('b'), form = document.getElementById('f');
  const history = [];
  let assistantName = 'the assistant';

  // Load Susan's chosen name (if she's set one) so the widget reflects it too.
  fetch('/api/agent-name').then(r => r.json()).then(d => {
    if (d && d.name) {
      assistantName = d.name;
      document.getElementById('headerName').textContent = 'The Dreamerie';
      document.getElementById('greeting').textContent =
        "Hi there! ✨ I'm " + d.name + ". Ask me about our candles, decor, or gifts — or tell me what you need and I'll take care of you.";
    }
  }).catch(() => {});

  document.getElementById('closeBtn').addEventListener('click', () => {
    panel.style.display = 'none'; bubble.style.display = 'flex';
  });
  bubble.addEventListener('click', () => {
    bubble.style.display = 'none'; panel.style.display = 'flex'; input.focus();
  });
  const add = (text, who) => {
    const d = document.createElement('div'); d.className = 'msg ' + who; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
  };
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim(); if (!text) return;
    input.value = ''; add(text, 'me'); btn.disabled = true;
    history.push({ role: 'user', content: text });
    const typing = document.createElement('div'); typing.className = 'typing';
    typing.textContent = assistantName + ' is typing…'; log.appendChild(typing); log.scrollTop = log.scrollHeight;
    try {
      const r = await fetch('/api/public-chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
      });
      const d = await r.json();
      typing.remove(); add(d.reply, 'bot');
      history.push({ role: 'assistant', content: d.reply });
    } catch (err) {
      typing.remove();
      add("Sorry — I'm having trouble connecting right now. Please try again, or give us a call and we'll help.", 'bot');
    } finally { btn.disabled = false; input.focus(); }
  });
</script>
</body>
</html>
